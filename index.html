<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SUPER SECRET! RED AND HEIDI ONLY!!</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #eee;
    }
    #box {
      background: #222;
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }
    input {
      padding: 0.5rem;
      width: 100%;
      border-radius: 6px;
      border: none;
      margin-top: 1rem;
    }
    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 6px;
      background: #444;
      color: #eee;
      cursor: pointer;
    }
    button:hover {
      background: #555;
    }

  .scene{
    position:relative;
    max-width:800px;
    margin:auto;
    padding:30px;
}

/* pngs  */
.decor{
    position:absolute;
    width:175px;   /* adjust size */
    height:auto;
    pointer-events:none; /* so they don't block clicks */
}

    
  </style>
</head>
<body>
  
   <img src="rainbow1.png" class="decor" style="top:90px; left:120px;">
   <img src="rainbow2.png" class="decor" style="top:500px; left:800px;">
   <img src="rainbow1.png" class="decor" style="top:3000px; left:1700px;">
   <img src="heartballoon.png" class="decor" style="top:900px; left:100px;">
   <img src="hearts.png" class="decor" style="top:200px; left:120px;">
   <img src="hearts2.png" class="decor" style="top:300px; left:120px;">
   <img src="plus.png" class="decor" style="top:400px; left:120px;">
   <img src="plus.png" class="decor" style="top:600px; left:120px;">
   <img src="star1.png" class="decor" style="top:800px; left:120px;">
   <img src="star1.png" class="decor" style="top:900px; left:120px;">
   <img src="star2.png" class="decor" style="top:1000px; left:120px;">
   <img src="star2.png" class="decor" style="top:1200px; left:120px;">
   <img src="swirls.png" class="decor" style="top:2000px; left:120px;">
   <img src="swirls.png" class="decor" style="top:2200px; left:120px;">

  
<div class="scene">
   
  <div id="box">
    <h2>What's the password?</h2>
    <input type="password" id="pw" placeholder="Password">
    <button onclick="check()">Submit</button>
    <p id="msg" style="color: red; margin-top: 0.5rem;"></p>
  </div>
  
 
  
</div>

  
  <script>
    function check() {
      const password = "NORMAL"; // <-- set password
      const input = document.getElementById("pw").value;

      if(input.toLowerCase() === password.toLowerCase()) {
        alert("Access granted!");
        window.location.href = "poll.html"; // redirect to inside page
      } else {
        document.getElementById("msg").textContent = "Incorrect password.";
      }
    }
  </script>
</body>
</html>
