<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHOOSE YOUR FAVORITE!!!</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:800px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
}

#voteStatus{
    text-align:center;
    margin-bottom:20px;
    font-weight:bold;
}

#leader{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin:20px 0;
}

.candidate{
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:10px;
    padding:12px;
    cursor:pointer;
    transition:0.2s;
}

.candidate:hover{
    background:#f5f5f5;
}

.candidate.disabled{
    cursor:default;
    opacity:0.85;
}

.candidate-header{
    display:flex;
    justify-content:space-between;
    font-weight:bold;
    margin-bottom:6px;
}

.bar-container{
    width:100%;
    height:22px;
    background:#e6e6e6;
    border-radius:12px;
    overflow:hidden;
}

.bar{
    height:100%;
    background:#ed0297;
    width:0%;
    transition:width 0.4s ease;
}

.leader{
    border:2px solid #4caf50;
}

.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    border:2px solid black;
    padding:20px;
    text-align:center;
    z-index:999;
}
</style>
</head>

<body>

<h1>Choose your favorite!</h1>

<div id="voteStatus"></div>
<div id="leader"></div>
<div id="poll"></div>

<div id="popup" class="popup">
    <p>Thanks for voting!</p>
    <button onclick="window.location.href='themagicalshipchartinquestion.html'">Continue</button>
    <button onclick="closePopup()">Stay Here</button>
</div>

<script>

const API_URL = "https://redandheidismagicalshipchart.telepathyfordummies.workers.dev";

const candidates = [
    "Tweek/Craig",
    "Clyde/Kenny",
    "Stan/Marj",
    "Wendy/Tammy",
    "Christophe/Rebecca",
    "Damien/Brimmy",
    "Kyle/Cartman/Bebe",
    "Bebe/Wendy",
    "Kenny/Damien",
    "Damien/Dovakien",
    "Stan/Kyle",
    "Stan/Tammy",
    "Clyde/Wendy",
    "Pete/Michael",
    "Pete/Marj",
    "Pete/Henrietta",
    "Other"
];

async function vote(name){

    if(localStorage.getItem("alreadyVoted")) return;

    try{

        await fetch(`${API_URL}/vote`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({vote:name})
        });

        localStorage.setItem("alreadyVoted","true");
        localStorage.setItem("votedFor",name);

        await loadResults();

        document.getElementById("popup").style.display="block";

    }catch(err){
        alert("Vote failed. Check Worker.");
        console.error(err);
    }
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

async function loadResults(){

    try{

        const res = await fetch(`${API_URL}/results`);

        if(!res.ok){
            throw new Error("Worker error: " + res.status);
        }

        const data = await res.json();

        let total = 0;

        candidates.forEach(n=>{
            total += data[n] || 0;
        });

        let leader = "";
        let leaderVotes = 0;

        candidates.forEach(n=>{
            const v = data[n] || 0;
            if(v > leaderVotes){
                leaderVotes = v;
                leader = n;
            }
        });

        document.getElementById("leader").innerHTML =
            total > 0
            ? `Prom Royalty: ${leader} (${((leaderVotes/total)*100).toFixed(1)}%)`
            : "No votes yet";

        const voted = localStorage.getItem("alreadyVoted");
        const votedFor = localStorage.getItem("votedFor");

        document.getElementById("voteStatus").innerHTML =
            voted ? `You voted for: ${votedFor}` : "Click a name to vote";

        const poll = document.getElementById("poll");
        poll.innerHTML = "";

        candidates.forEach(name=>{

            const votes = data[name] || 0;

            const percent = total
                ? ((votes/total)*100).toFixed(1)
                : "0.0";

            const div = document.createElement("div");

            div.className = voted ? "candidate disabled" : "candidate";

            if(!voted){
                div.onclick = ()=>vote(name);
            }

            if(name === leader && total > 0){
                div.classList.add("leader");
            }

            div.innerHTML = `
                <div class="candidate-header">
                    <span>${name}</span>
                    <span>${percent}%</span>
                </div>
                <div class="bar-container">
                    <div class="bar" style="width:${percent}%"></div>
                </div>
            `;

            poll.appendChild(div);
        });

    }catch(err){
        console.error("Load failed:", err);
        document.getElementById("leader").innerHTML =
            "Error loading results (check Worker /results)";
    }
}

loadResults();
setInterval(loadResults, 5000);

</script>

</body>
</html>
