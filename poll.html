<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>What's your favorite ship?</h1>

<div class="poll-grid">

<button onclick="vote('Alice')">Tweek/Craig</button>
<button onclick="vote('Bob')">Clyde/Kenny</button>
<button onclick="vote('Charlie')">Stan/Marj</button>
<button onclick="vote('Diana')">Wendy/Tammy</button>

<button onclick="vote('Edward')">Christophe/Rebecca</button>
<button onclick="vote('Frank')">Damien/Brimmy</button>
<button onclick="vote('Grace')">Kyle/Cartman/Bebe</button>
<button onclick="vote('Henry')">Bebe/Wendy</button>

<button onclick="vote('Ivy')">Kenny/Damien</button>
<button onclick="vote('Jack')">Damien/Dovakien</button>
<button onclick="vote('Kate')">Stan/Kyle</button>
<button onclick="vote('Leo')">Stan/Tammy</button>

<button onclick="vote('Ivy')">Clyde/Wendy</button>
<button onclick="vote('Jack')">Pete/Michael</button>
<button onclick="vote('Kate')">Pete/Marj</button>
<button onclick="vote('Leo')">Pete/Henrietta</button>

<button onclick="vote('Leo')">Other</button>

</div>

<div id="popup" class="popup">
    <p>Thank you for voting.</p>

    <button onclick="window.location.href='themagicalshipchartinquestion.html'">
        Continue
    </button>

    <button onclick="closePopup()">
        Stay Here
    </button>
</div>

<script>

const API_URL =
"https://redandheidismagicalshipchart.telepathyfordummies.workers.dev/";

async function vote(name){

    if(localStorage.getItem("alreadyVoted")){
        alert("You have already voted.");
        return;
    }

    try{

        await fetch(
            `${API_URL}/vote`,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    vote:name
                })
            }
        );

        localStorage.setItem(
            "alreadyVoted",
            "true"
        );

        document.getElementById(
            "popup"
        ).style.display = "block";

    }catch(error){

        alert(
            "Unable to submit vote."
        );

    }
}

function closePopup(){
    document.getElementById(
        "popup"
    ).style.display = "none";
}

</script>

</body>
</html>
